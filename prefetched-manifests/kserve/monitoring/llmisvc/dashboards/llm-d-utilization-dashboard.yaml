apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: dashboard-3-llm-d-utilization-admin
spec:
  config:
    display:
      name: LLM Utilization
    duration: 1h
    variables:
    - kind: ListVariable
      spec:
        name: namespace
        display:
          name: Project
          description: Filter by project
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: exported_namespace
            matchers:
            - kserve_vllm:num_requests_running
    - kind: ListVariable
      spec:
        name: model_name
        display:
          name: Model
          description: Filter by model
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: model_name
            matchers:
            - kserve_vllm:num_requests_running{exported_namespace=~"$namespace"}
    panels:
      gpuUtilization:
        kind: Panel
        spec:
          display:
            name: GPU utilization
            description: GPU compute utilization per pod. Low utilization with high
              queue depth may indicate a CPU or memory bottleneck.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: percent
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: avg by (k8s_pod_name) (accelerator_gpu_utilization{exported_namespace=~"$namespace",model_name=~"$model_name"})
                  seriesNameFormat: '{{k8s_pod_name}}'
      queueDepthRunning:
        kind: Panel
        spec:
          display:
            name: Requests running
            description: Number of requests actively being processed per pod. Sustained
              high values indicate saturation.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum by (k8s_pod_name) (kserve_vllm:num_requests_running{exported_namespace=~"$namespace",model_name=~"$model_name"})
                  seriesNameFormat: '{{k8s_pod_name}}'
      queueDepthWaiting:
        kind: Panel
        spec:
          display:
            name: Requests waiting
            description: Number of requests queued and waiting per pod. Growth here
              signals the system is falling behind.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum by (k8s_pod_name) (kserve_vllm:num_requests_waiting{exported_namespace=~"$namespace",model_name=~"$model_name"})
                  seriesNameFormat: '{{k8s_pod_name}}'
      # Drill-down panel covers stretch/deferred panels P11, P12, P15, P16. Remove once those panels are added.
      drillDownHints:
        kind: Panel
        spec:
          display:
            name: Drill-down commands
          plugin:
            kind: Markdown
            spec:
              text: "<dl class=\"pf-v6-c-description-list pf-m-auto-column-widths\
                \ pf-m-horizontal\">\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Preemption count</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (k8s_pod_name)\
                \ (rate(kserve_vllm:num_preemptions_total{exported_namespace=~\"$namespace\"\
                }[5m]))</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">EPP pool health - ready\
                \ pods</span>\n    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">inference_pool_ready_pods{exported_namespace=~\"\
                $namespace\"}</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">EPP pool health - avg queue\
                \ size</span>\n    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">inference_pool_average_queue_size{exported_namespace=~\"\
                $namespace\"}</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-pod queue size from\
                \ scheduler</span>\n    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">inference_pool_per_pod_queue_size{exported_namespace=~\"\
                $namespace\"}</div>\n    </dd>\n  </div>\n</dl>"
    layouts:
    - kind: Grid
      spec:
        display:
          title: GPU utilization
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 24
          height: 8
          content:
            $ref: '#/spec/panels/gpuUtilization'
    - kind: Grid
      spec:
        display:
          title: Queue depth
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 12
          height: 8
          content:
            $ref: '#/spec/panels/queueDepthRunning'
        - x: 12
          y: 0
          width: 12
          height: 8
          content:
            $ref: '#/spec/panels/queueDepthWaiting'
    - kind: Grid
      spec:
        display:
          title: Drill-down
          collapse:
            open: false
        items:
        - x: 0
          y: 0
          width: 24
          height: 6
          content:
            $ref: '#/spec/panels/drillDownHints'
