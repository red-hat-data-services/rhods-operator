apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: dashboard-2-llm-d-traffic-admin
spec:
  config:
    display:
      name: LLM Traffic
    duration: 1h
    variables:
    - kind: ListVariable
      spec:
        name: namespace
        display:
          name: Project
          description: Filter by project
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: exported_namespace
            matchers:
            - kserve_vllm:num_requests_running
    - kind: ListVariable
      spec:
        name: model_name
        display:
          name: Model
          description: Filter by model
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: model_name
            matchers:
            - kserve_vllm:num_requests_running{exported_namespace=~"$namespace"}
    panels:
      errorRate:
        kind: Panel
        spec:
          display:
            name: Error rate
            description: Rate of failed requests across all models. A sustained increase
              may indicate backend issues or model overload.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(inference_model_request_error_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])) or vector(0)
                  seriesNameFormat: Errors/s
      throughput:
        kind: Panel
        spec:
          display:
            name: Throughput (req/s)
            description: Successful and failed requests per second. Compare the two
              to gauge overall system reliability.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(kserve_vllm:request_success_total{exported_namespace=~"$namespace",model_name=~"$model_name",
                    finished_reason=~"length|stop"}[$__rate_interval]))
                  seriesNameFormat: Successful
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(inference_model_request_error_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                  seriesNameFormat: Errors
      totalTokens:
        kind: Panel
        spec:
          display:
            name: Token throughput (tokens/s)
            description: Combined input and output token processing rate. Indicates
              how much work the system is doing.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(kserve_vllm:prompt_tokens_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                    + sum(rate(kserve_vllm:generation_tokens_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                  seriesNameFormat: Total
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(kserve_vllm:prompt_tokens_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                  seriesNameFormat: Input
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(kserve_vllm:generation_tokens_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                  seriesNameFormat: Output
      # Drill-down panel covers stretch/deferred panels P18, P19, Dashboard 4. Remove once those panels are added.
      drillDownHints:
        kind: Panel
        spec:
          display:
            name: Drill-down commands
          plugin:
            kind: Markdown
            spec:
              text: "<dl class=\"pf-v6-c-description-list pf-m-auto-column-widths\
                \ pf-m-horizontal\">\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Error breakdown by error\
                \ code</span>\n    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (error_code)\
                \ (rate(inference_model_request_error_total{exported_namespace=~\"\
                $namespace\"}[5m]))</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-model input token consumption</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (model_name)\
                \ (rate(kserve_vllm:prompt_tokens_total{exported_namespace=~\"$namespace\"\
                }[5m]))</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-model output token\
                \ consumption</span>\n    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (model_name)\
                \ (rate(kserve_vllm:generation_tokens_total{exported_namespace=~\"\
                $namespace\"}[5m]))</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-model total token consumption</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (model_name)\
                \ (rate(kserve_vllm:prompt_tokens_total{exported_namespace=~\"$namespace\"\
                }[5m]) + rate(kserve_vllm:generation_tokens_total{exported_namespace=~\"\
                $namespace\"}[5m]))</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Request outcome breakdown</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (finished_reason)\
                \ (rate(kserve_vllm:request_success_total{exported_namespace=~\"$namespace\"\
                }[5m]))</div>\n    </dd>\n  </div>\n</dl>"
    layouts:
    - kind: Grid
      spec:
        display:
          title: Overview
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 8
          height: 8
          content:
            $ref: '#/spec/panels/errorRate'
        - x: 8
          y: 0
          width: 8
          height: 8
          content:
            $ref: '#/spec/panels/throughput'
        - x: 16
          y: 0
          width: 8
          height: 8
          content:
            $ref: '#/spec/panels/totalTokens'
    - kind: Grid
      spec:
        display:
          title: Drill-down
          collapse:
            open: false
        items:
        - x: 0
          y: 0
          width: 24
          height: 6
          content:
            $ref: '#/spec/panels/drillDownHints'
