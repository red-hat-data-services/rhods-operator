apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: dashboard-4-llm-d-performance-admin
spec:
  config:
    display:
      name: LLM Performance
    duration: 1h
    variables:
    - kind: ListVariable
      spec:
        name: namespace
        display:
          name: Project
          description: Filter by project
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: exported_namespace
            matchers:
            - kserve_vllm:num_requests_running
    - kind: ListVariable
      spec:
        name: model_name
        display:
          name: Model
          description: Filter by model
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: model_name
            matchers:
            - kserve_vllm:num_requests_running{exported_namespace=~"$namespace"}
    panels:
      ttft:
        kind: Panel
        spec:
          display:
            name: Time to first token (TTFT)
            description: Time from request arrival to first generated token. Sensitive
              to prompt length, cache hits, and queue depth.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: seconds
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.50, sum by (le) (rate(kserve_vllm:time_to_first_token_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P50
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.95, sum by (le) (rate(kserve_vllm:time_to_first_token_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P95
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.99, sum by (le) (rate(kserve_vllm:time_to_first_token_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P99
      e2eLatency:
        kind: Panel
        spec:
          display:
            name: E2E request latency
            description: Total request duration from submission to final token. Combines
              queuing, prefill, and generation time.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: seconds
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.50, sum by (le) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P50
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.95, sum by (le) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P95
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.99, sum by (le) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P99
      interTokenLatency:
        kind: Panel
        spec:
          display:
            name: Inter-token latency
            description: Time between consecutive output tokens during generation.
              Affects streaming responsiveness.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: seconds
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.50, sum by (le) (rate(kserve_vllm:time_per_output_token_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P50
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.95, sum by (le) (rate(kserve_vllm:time_per_output_token_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P95
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: (histogram_quantile(0.99, sum by (le) (rate(kserve_vllm:time_per_output_token_seconds_bucket{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval])))
                    > -Inf) or vector(0)
                  seriesNameFormat: P99
      kvCacheHitRate:
        kind: Panel
        spec:
          display:
            name: KV cache hit rate
            description: Fraction of prompt prefill served from cache. Higher rates
              reduce TTFT for repeated or similar prompts.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: percent-decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum(rate(kserve_vllm:prefix_cache_hits_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                    / (sum(rate(kserve_vllm:prefix_cache_queries_total{exported_namespace=~"$namespace",model_name=~"$model_name"}[$__rate_interval]))
                    > 0)
                  seriesNameFormat: Hit rate
      kvCacheUsage:
        kind: Panel
        spec:
          display:
            name: KV cache usage
            description: Percentage of GPU memory allocated to KV cache that is currently
              in use. Near 100% triggers evictions.
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: percent-decimal
                min: 0
                max: 1
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: avg(kserve_vllm:kv_cache_usage_perc{exported_namespace=~"$namespace",model_name=~"$model_name"})
                  seriesNameFormat: Usage
      # Drill-down panel covers stretch/deferred panels P13, P14, P17. Remove once those panels are added.
      drillDownHints:
        kind: Panel
        spec:
          display:
            name: Drill-down commands
          plugin:
            kind: Markdown
            spec:
              text: "<dl class=\"pf-v6-c-description-list pf-m-auto-column-widths\
                \ pf-m-horizontal\">\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-pod cache hit rate</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">sum by (k8s_pod_name)\
                \ (rate(kserve_vllm:prefix_cache_hits_total{exported_namespace=~\"\
                $namespace\"}[5m])) / sum by (k8s_pod_name) (rate(kserve_vllm:prefix_cache_queries_total{exported_namespace=~\"\
                $namespace\"}[5m]))</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-pod KV cache usage</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">kserve_vllm:kv_cache_usage_perc{exported_namespace=~\"\
                $namespace\"}</div>\n    </dd>\n  </div>\n  <div class=\"pf-v6-c-description-list__group\"\
                >\n    <dt class=\"pf-v6-c-description-list__term\">\n      <span\
                \ class=\"pf-v6-c-description-list__text\">Per-pod TTFT P99</span>\n\
                \    </dt>\n    <dd class=\"pf-v6-c-description-list__description\"\
                >\n      <div class=\"pf-v6-c-description-list__text\">histogram_quantile(0.99,\
                \ sum by (le, k8s_pod_name) (rate(kserve_vllm:time_to_first_token_seconds_bucket{exported_namespace=~\"\
                $namespace\"}[5m])))</div>\n    </dd>\n  </div>\n</dl>"
    layouts:
    - kind: Grid
      spec:
        display:
          title: Latency
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 8
          height: 8
          content:
            $ref: '#/spec/panels/ttft'
        - x: 8
          y: 0
          width: 8
          height: 8
          content:
            $ref: '#/spec/panels/e2eLatency'
        - x: 16
          y: 0
          width: 8
          height: 8
          content:
            $ref: '#/spec/panels/interTokenLatency'
    - kind: Grid
      spec:
        display:
          title: KV cache
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 12
          height: 8
          content:
            $ref: '#/spec/panels/kvCacheHitRate'
        - x: 12
          y: 0
          width: 12
          height: 8
          content:
            $ref: '#/spec/panels/kvCacheUsage'
    - kind: Grid
      spec:
        display:
          title: Drill-down
          collapse:
            open: false
        items:
        - x: 0
          y: 0
          width: 24
          height: 6
          content:
            $ref: '#/spec/panels/drillDownHints'
