apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


resources:
  - llmisvc.yaml
  - ../../../../../../test/llmisvc/eval/base

patches:
  - target:
      kind: Job
      name: lm-eval
    patch: |-
      - op: replace
        path: /metadata/name
        value: "lm-eval-qwen2-7b-instruct-single"
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "Qwen/Qwen2.5-7B-Instruct"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "http://openshift-ai-inference-openshift-default.openshift-ingress.svc.cluster.local/llm-d-observability/qwen2-7b-instruct-single"
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "gsm8k,mmlu_abstract_algebra"
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "10"
