apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-config-managed

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: model-serving-llms-cluster-health
  files:
  - model-serving-llms-cluster-health-odc.json
- name: model-serving-llms-model-performance-usage
  files:
  - model-serving-llms-model-performance-usage-odc.json
- name: model-serving-llms-replica-detail
  files:
  - model-serving-llms-replica-detail-odc.json
- name: model-serving-llms-failure-diagnostics
  files:
  - model-serving-llms-failure-diagnostics-odc.json

labels:
- pairs:
    console.openshift.io/dashboard: "true"
    app.kubernetes.io/part-of: kserve

patches:
- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: model-serving-llms-model-performance-usage
      labels:
        console.openshift.io/odc-dashboard: "true"
- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: model-serving-llms-replica-detail
      labels:
        console.openshift.io/odc-dashboard: "true"
- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: model-serving-llms-failure-diagnostics
      labels:
        console.openshift.io/odc-dashboard: "true"
