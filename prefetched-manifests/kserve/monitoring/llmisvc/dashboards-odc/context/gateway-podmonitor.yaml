apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app.kubernetes.io/component: llm-monitoring
    app.kubernetes.io/managed-by: odh-model-controller
    app.kubernetes.io/part-of: llminferenceservice
    monitoring.opendatahub.io/scrape: "true"
  name: openshift-ai-inference-metrics
  namespace: openshift-ingress
spec:
  podMetricsEndpoints:
  - metricRelabelings:
    - action: keep
      regex: istio_requests_total|istio_request_duration_milliseconds_(bucket|sum|count)|istio_request_bytes_(bucket|sum|count)|istio_response_bytes_(bucket|sum|count)
      sourceLabels:
      - __name__
    path: /stats/prometheus
    port: metrics
    relabelings:
    - action: replace
      sourceLabels:
      - __meta_kubernetes_pod_label_gateway_networking_k8s_io_gateway_name
      targetLabel: gateway_name
    - action: replace
      replacement: "true"
      targetLabel: llm_isvc_gateway
    scheme: http
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: openshift-ai-inference
