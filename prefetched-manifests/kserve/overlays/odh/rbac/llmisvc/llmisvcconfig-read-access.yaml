# Namespaced Role + RoleBinding (not ClusterRole) so that all authenticated
# users can read LLMInferenceServiceConfig objects in the operator namespace.
# These configs can be referenced as baseRef by any user, so read access is
# required for discovery, without granting cross-namespace access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kserve-llmisvcconfig-read-access
rules:
  - apiGroups: [ "serving.kserve.io" ]
    resources: [ "llminferenceserviceconfigs" ]
    verbs: [ "get", "watch", "list" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kserve-llmisvcconfig-read-access
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: kserve-llmisvcconfig-read-access
  apiGroup: rbac.authorization.k8s.io
