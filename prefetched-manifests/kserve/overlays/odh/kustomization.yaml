apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
# - ../../crd/full/localmodel
- rbac/
- accelerators/
- accelerators-fast/
- network-policies.yaml
- ../../monitoring/llmisvc

components:
- ../../components/kserve
- ../../components/llmisvc
# - ../../localmodels
# LLMInferenceServiceConfig resources listed last so they appear after all other
# resources in FIFO sort order (components are appended after resources).
# This ordering is critical for upgrades (e.g. 3.3 -> 3.4). In 3.3, there was
# a single uber controller + webhook that included the llmisvc controller. In
# 3.4, llmisvc has its own separate controller + webhook. During upgrades the
# cluster is in a mixed state: the new controller(s) get deployed but the
# ValidatingWebhookConfiguration may still use the old configuration, which is
# incompatible with the new controller(s). If LLMInferenceServiceConfig
# resources are applied before the webhook is fully updated, validation fails
# and blocks the operator (DSC) from becoming ready. Placing these resources
# last gives the controllers and webhooks a chance to be reconciled first.
- llmisvcconfig/

namespace: opendatahub

patches:
- path: patches/remove-namespace.yaml
- path: patches/remove-cert-manager.yaml
- path: patches/remove-clusterservingruntime.yaml
- path: patches/inferenceservice-config-patch.yaml
- path: patches/set-resources-manager-patch.yaml
- path: patches/remove-auth-proxy-patch.yaml
- path: patches/config-scheduler-patch.yaml
- target:
    kind: ValidatingWebhookConfiguration
    annotationSelector: cert-manager.io/inject-ca-from
  path: patches/openshift-ca-patch.yaml
- target:
    kind: MutatingWebhookConfiguration
    annotationSelector: cert-manager.io/inject-ca-from
  path: patches/openshift-ca-patch.yaml
- target:
    kind: CustomResourceDefinition
    annotationSelector: cert-manager.io/inject-ca-from
  path: patches/openshift-ca-patch.yaml
- target:
    kind: Service
    name: kserve-webhook-server-service
  path: patches/openshift-serving-cert-patch.yaml
- target:
    kind: Service
    name: llmisvc-webhook-server-service
  path: patches/openshift-serving-cert-llmisvc-patch.yaml
- target:
    kind: LLMInferenceServiceConfig
  path: patches/annotate-well-known-llmisvcconfigs.yaml
- target:
    kind: Deployment
    name: llmisvc-controller-manager
  path: patches/remove-kserve-controller-runas.yaml
- target:
    kind: ClusterStorageContainer
    name: default
  path: patches/set-resources-storagecontainer-patch.yaml

replacements:
- source:
    kind: ConfigMap
    name: kserve-parameters
    fieldPath: data.kserve-controller
  targets:
  - select:
      kind: Deployment
      name: kserve-controller-manager
    fieldPaths:
    - spec.template.spec.containers.[name=manager].image
# Replace base LLMInferenceServiceConfig images with Red Hat CUDA image
- source:
    kind: ConfigMap
    name: kserve-parameters
    fieldPath: data.kserve-llm-d
  targets:
  - select:
      kind: LLMInferenceServiceConfig
      name: kserve-config-llm-template
    fieldPaths:
    - spec.template.containers.[name=main].image
  - select:
      kind: LLMInferenceServiceConfig
      name: kserve-config-llm-worker-data-parallel
    fieldPaths:
    - spec.template.containers.[name=main].image
    - spec.worker.containers.[name=main].image
  - select:
      kind: LLMInferenceServiceConfig
      name: kserve-config-llm-decode-template
    fieldPaths:
    - spec.template.containers.[name=main].image
  - select:
      kind: LLMInferenceServiceConfig
      name: kserve-config-llm-decode-worker-data-parallel
    fieldPaths:
    - spec.template.containers.[name=main].image
    - spec.worker.containers.[name=main].image
  - select:
      kind: LLMInferenceServiceConfig
      name: kserve-config-llm-prefill-template
    fieldPaths:
    - spec.prefill.template.containers.[name=main].image
  - select:
      kind: LLMInferenceServiceConfig
      name: kserve-config-llm-prefill-worker-data-parallel
    fieldPaths:
    - spec.prefill.template.containers.[name=main].image
    - spec.prefill.worker.containers.[name=main].image
# Replace scheduler image with ODH image
- source:
