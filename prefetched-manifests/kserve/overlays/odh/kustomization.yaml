# Stamp the upstream runtime (vLLM) version annotation on the accelerator
# LLMInferenceServiceConfig presets. Values are injected into params.env by the
# build pipeline as raw SBOM versionInfo strings. Each preset is stamped from
# its own dedicated key: base presets from the base *-upstream-version keys,
# fast variants from the matching *-fast-N-upstream-version keys.
