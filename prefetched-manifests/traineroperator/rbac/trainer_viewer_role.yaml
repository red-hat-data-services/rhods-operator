# This rule is not used by the project odh-trainer-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to components.platform.opendatahub.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: odh-trainer-operator
    app.kubernetes.io/managed-by: kustomize
  name: trainer-viewer-role
rules:
- apiGroups:
  - components.platform.opendatahub.io
  resources:
  - trainers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - components.platform.opendatahub.io
  resources:
  - trainers/status
  verbs:
  - get
