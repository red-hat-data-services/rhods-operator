---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kserve-module-controller-manager
  labels:
    app.kubernetes.io/name: kserve-module-controller-manager
    app.kubernetes.io/component: controller
    control-plane: kserve-module-controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: kserve-module-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kserve-module-controller-manager
        app.kubernetes.io/component: controller
        control-plane: kserve-module-controller-manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: kserve-module-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
      - name: manager
        image: kserve-module-controller
        command:
          - /manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        args:
        - "--leader-elect"
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        livenessProbe:
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 10
          httpGet:
            path: /healthz
            port: 8081
        readinessProbe:
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 15
          httpGet:
            path: /readyz
            port: 8081
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - name: manifests
          mountPath: /opt/manifests
        - name: tmp
          mountPath: /tmp
        - name: trusted-ca
          mountPath: /etc/pki/tls/custom
          readOnly: true
      volumes:
      - name: manifests
        emptyDir:
          sizeLimit: 256Mi
      - name: tmp
        emptyDir: {}
      - name: trusted-ca
        configMap:
          name: odh-trusted-ca-bundle
          optional: true
