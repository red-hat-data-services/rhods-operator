apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: opendatahub-feast-operator
  name: opendatahub-feast-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opendatahub-feast-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ default (include "chart.fullname" .) .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}