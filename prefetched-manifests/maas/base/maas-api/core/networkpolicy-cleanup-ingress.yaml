apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: maas-api-allow-cleanup
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: maas-api
      app.kubernetes.io/component: api
      app.kubernetes.io/part-of: models-as-a-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: maas-api-cleanup
          app.kubernetes.io/name: maas-api
          app.kubernetes.io/component: api
          app.kubernetes.io/part-of: models-as-a-service
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8443
