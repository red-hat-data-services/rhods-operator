apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Component to enable infrastructure namespace separation.
# When included in an overlay, maas-api and maas-db-config will deploy to
# a dedicated infrastructure namespace instead of the controller namespace.
# Note: PostgreSQL can be external (e.g., AWS RDS) - only the connection secret moves.
#
# To enable this component, add to overlay kustomization.yaml:
#   components:
#   - ../../components/infra-namespace-separation
#
# The infrastructure namespace is auto-derived from the controller namespace:
#   opendatahub → odh-ai-gateway-infra
#   redhat-ods-applications → redhat-ai-gateway-infra
#
# TODO: When namespace separation becomes the default, this component becomes obsolete
# (it would only override the default back to no separation).

patches:
- path: namespace-patch.yaml
  target:
    kind: Deployment
    name: maas-controller
