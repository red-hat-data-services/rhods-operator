# MaaS Usage Logs EnvoyFilter
#
# Emits structured usage logs for inference requests via OTel Access Log Service.
#
# Identity:  All identity fields from auth identity FILTER_STATE
#            (wasm.kuadrant.auth.identity.*), set by Kuadrant WASM plugin.
# Model:     Composite filter wraps json_to_metadata, executing only on
#            inference paths (suffix match: /v1/chat/completions, /v1/completions).
#            Extracts "model" from request body (covers 429),
#            then overwrites from response body on 200 (authoritative).
# Tokens:    json_to_metadata extracts usage.{total,prompt,completion}_tokens
#            from response body (application/json only).
# Scope:     Composite filter path match + CEL access log filter both restrict
#            to inference endpoints only.
# Targeting: Gateway API targetRefs.
#
# Streaming (Server-Sent Events):
#            json_to_metadata sees text/event-stream (not application/json)
#            and fires on_error — zero buffering, tokens default to "0".
#            A companion Lua filter (sse_tokens) then takes over: iterates
#            bodyChunks() without buffering, scans each chunk for usage
#            fields, and overwrites the "0" metadata with real token counts.
#            The SSE stream passes through untouched to the client.
#
# Safety:    on_error / on_missing rules guarantee fallback "0" for tokens.
#            Model uses on_present only — if the body has no model field or
#            parsing fails, metadata is simply not set (access log outputs "-").
#            The OTel ALS gRPC channel is async; if the collector is
#            unreachable, Envoy silently discards the log entry without
#            affecting the request.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: maas-model-access-logs
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/part-of: maas-observability
    app.kubernetes.io/managed-by: maas-controller
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  configPatches:

  # ── Cluster: gRPC endpoint to OTel Collector ──────────────────────────
  - applyTo: CLUSTER
    patch:
      operation: ADD
      value:
        name: otel_als_cluster
        type: STRICT_DNS
        connect_timeout: 5s
        http2_protocol_options: {}
        load_assignment:
          cluster_name: otel_als_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: usage-logs-collector.opendatahub.svc.cluster.local
                    port_value: 4317

  # ── Composite filter: json_to_metadata with path-based pattern matching ────
  #
  # Wraps json_to_metadata inside a Composite filter that only executes on
  # inference paths (suffix match on :path). Non-inference requests
  # (/v1/models, /maas-api/*) skip body parsing entirely.
  #
  # Matches OpenAI + MaaS conventions:
  #   - /<ns>/<model>/v1/chat/completions  (path-based routing, current)
  #   - /<ns>/<model>/v1/completions       (legacy)
  #   - /v1/chat/completions               (body-based routing, future)
  #
  # request_rules  — extracts "model" from the JSON request body.
  # response_rules — extracts token counts and authoritative model from the
  #                   JSON response body (application/json only).
  #
  # Streaming (SSE) responses:
  #   Content-Type text/event-stream does NOT match the default
  #   allow_content_types (application/json), so response_rules immediately
  #   fire on_error — no body buffering, no interference with the SSE stream.
  #   Token values default to "0". The response model rule has on_present
  #   only, so the request-extracted model stays in metadata untouched.
  #
  # 429 (rate-limited) responses:
  #   The error JSON body lacks usage/model fields, so response_rules fire
  #   on_missing. Tokens default to "0". Response model rule has on_present
  #   only, so the request-extracted model stays in metadata untouched.
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: INSERT_FIRST
      value:
        name: composite
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.common.matching.v3.ExtensionWithMatcher
          extension_config:
            name: composite
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.composite.v3.Composite
          xds_matcher:
            matcher_list:
              matchers:
              - predicate:
                  or_matcher:
                    predicate:
                    - single_predicate:
                        input:
                          name: request-headers
                          typed_config:
                            "@type": type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                            header_name: ":path"
                        value_match:
                          suffix: "/v1/chat/completions"
                    - single_predicate:
                        input:
                          name: request-headers
                          typed_config:
                            "@type": type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                            header_name: ":path"
                        value_match:
                          suffix: "/v1/completions"
                on_match:
                  action:
                    name: run-json-to-metadata
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.composite.v3.ExecuteFilterAction
                      typed_config:
                        name: envoy.filters.http.json_to_metadata
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.json_to_metadata.v3.JsonToMetadata
                          request_rules:
                            rules:
                            - selectors:
                              - key: model
                              on_present:
                                key: model
                          response_rules:
                            rules:
                            # ── Token counts ──
                            # preserve_existing_metadata_value on on_error/on_missing:
                            # Response filters run in reverse chain order. The Lua SSE
                            # companion (later in chain) processes the response FIRST and
                            # writes real token values. json_to_metadata (first in chain)
                            # processes the response LAST — on_error fires for SSE
                            # content-type mismatch. Without preserve, it would overwrite
                            # the Lua-extracted tokens with "0".
                            - selectors:
                              - key: usage
                              - key: total_tokens
                              on_present:
                                key: tokens_total
                              on_missing:
                                key: tokens_total
                                value: "0"
                                preserve_existing_metadata_value: true
                              on_error:
                                key: tokens_total
                                value: "0"
                                preserve_existing_metadata_value: true
                            - selectors:
                              - key: usage
                              - key: prompt_tokens
                              on_present:
                                key: tokens_prompt
                              on_missing:
                                key: tokens_prompt
                                value: "0"
                                preserve_existing_metadata_value: true
                              on_error:
                                key: tokens_prompt
                                value: "0"
                                preserve_existing_metadata_value: true
                            - selectors:
                              - key: usage
                              - key: completion_tokens
                              on_present:
                                key: tokens_completion
                              on_missing:
                                key: tokens_completion
                                value: "0"
                                preserve_existing_metadata_value: true
                              on_error:
                                key: tokens_completion
                                value: "0"
                                preserve_existing_metadata_value: true
                            # ── Authoritative model from response ──
                            # On 200 JSON: overwrites the request-extracted model with the
                            # response value (authoritative, not user-spoofable).
                            # On SSE/429: no on_missing/on_error configured, so the
                            # request-extracted model stays in metadata untouched.
                            - selectors:
                              - key: model
                              on_present:
                                key: model

  # ── Lua SSE token extraction (companion to json_to_metadata) ─────────
  #
  # json_to_metadata handles application/json responses (non-streaming).
  # This Lua filter handles text/event-stream responses (streaming SSE).
  #
  # Requires the model server to include usage in streaming responses:
  # either the client sends stream_options.include_usage=true, or the
  # server is started with --enable-force-include-usage (vLLM/llm-d).
  # Without either, tokens will be "0" per the OpenAI API spec.
  #
  # Ordering: INSERT_BEFORE router = last in request chain, FIRST in
  # response chain. This matters: Lua writes real token values to metadata
  # before json_to_metadata (INSERT_FIRST) runs on the response and would
  # overwrite them with "0" (prevented by preserve_existing_metadata_value).
  #
  # is_completions: flag set on the request path to mark inference
  # endpoints. Needed because envoy_on_response cannot read request
  # headers — the flag passes path info via dynamic metadata.
  #
  # bodyChunks() iterates SSE chunks as they arrive — zero buffering,
  # the client receives events in real-time. Token usage appears only
  # in the final SSE event; last-seen values win across all chunks.
  #
  # pcall wraps the bodyChunks() loop: if any chunk is malformed, the
  # error is caught and tokens fall back to "0" (never crashes the filter).
  # NO break inside the loop — Envoy requires bodyChunks() to drain fully.
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.lua.sse_tokens
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          default_source_code:
            inline_string: |
              local MD_NS = "envoy.filters.http.json_to_metadata"

              -- Request: mark inference endpoints so the response handler
              -- knows which responses to process (path is not available
              -- in envoy_on_response).
              function envoy_on_request(request_handle)
                local path = request_handle:headers():get(":path")
                if path
                   and (string.find(path, "/v1/chat/completions", 1, true)
                     or string.find(path, "/v1/completions", 1, true))
                then
                  request_handle:streamInfo():dynamicMetadata():set(
                    MD_NS, "is_completions", "true")
                end
              end

              -- Response: extract token usage from SSE streaming responses.
              -- Non-inference and non-SSE responses return immediately.
              function envoy_on_response(response_handle)
                -- Skip non-inference requests
                local meta = response_handle:streamInfo():dynamicMetadata():get(MD_NS)
                if not (meta and meta["is_completions"] == "true") then return end

                -- Skip non-streaming responses (json_to_metadata handles those)
                local ct = response_handle:headers():get("content-type") or ""
                if not string.find(ct, "text/event-stream", 1, true) then return end

                -- Iterate SSE chunks; pcall catches malformed data
                local ok, total, prompt, completion, model = pcall(function()
                  local t, p, c, m = "0", "0", "0", nil

                  for chunk in response_handle:bodyChunks() do
                    local data = chunk:getBytes(0, chunk:length())

                    local tt = string.match(data, '"total_tokens"%s*:%s*(%d+)')
                    if tt then
                      t = tt
                      p = string.match(data, '"prompt_tokens"%s*:%s*(%d+)') or "0"
                      c = string.match(data, '"completion_tokens"%s*:%s*(%d+)') or "0"
                    end

                    local mm = string.match(data, '"model"%s*:%s*"([^"]+)"')
                    if mm then m = mm end
                  end

                  return t, p, c, m
                end)

                -- Write to same metadata namespace as json_to_metadata
                local md = response_handle:streamInfo():dynamicMetadata()
                md:set(MD_NS, "tokens_total",      ok and total      or "0")
                md:set(MD_NS, "tokens_prompt",      ok and prompt     or "0")
                md:set(MD_NS, "tokens_completion",  ok and completion or "0")
                if ok and model then md:set(MD_NS, "model", model) end
              end

  # ── OTel Access Log Service ───────────────────────────────────────────
  # CEL filter restricts to inference paths. Attributes streamed via gRPC.
  - applyTo: NETWORK_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: MERGE
      value:
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          access_log:
          - name: envoy.access_loggers.open_telemetry
            filter:
              extension_filter:
                name: envoy.access_loggers.extension_filters.cel
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.filters.cel.v3.ExpressionFilter
                  expression: >-
                    request.method == 'POST'
                    && (request.path.endsWith('/v1/chat/completions')
                        || request.path.endsWith('/v1/completions'))
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.open_telemetry.v3.OpenTelemetryAccessLogConfig
              common_config:
                log_name: maas-usage-log
                transport_api_version: V3
                grpc_service:
                  envoy_grpc:
                    cluster_name: otel_als_cluster
              body:
                string_value: "%RESPONSE_CODE% %REQ(:PATH)%"
              attributes:
                values:
                # ── Response ──
                - key: response_code
                  value:
                    string_value: "%RESPONSE_CODE%"
                - key: response_type
                  value:
                    string_value: '%CEL(response.code >= 200 && response.code < 300 ? "hit" : (response.code == 429 ? "rate_limit" : "error"))%'
                # ── Identity ──
                - key: user_id
                  value:
                    string_value: "%FILTER_STATE(wasm.kuadrant.auth.identity.userid:PLAIN)%"
                - key: subscription
                  value:
                    string_value: "%FILTER_STATE(wasm.kuadrant.auth.identity.selected_subscription:PLAIN)%"
                - key: groups
                  value:
                    string_value: "%FILTER_STATE(wasm.kuadrant.auth.identity.groups:PLAIN)%"
                - key: key_id
                  value:
                    string_value: "%FILTER_STATE(wasm.kuadrant.auth.identity.keyId:PLAIN)%"
                - key: key_name
                  value:
                    string_value: "%FILTER_STATE(wasm.kuadrant.auth.identity.keyName:PLAIN)%"
                - key: organization_id
                  value:
                    string_value: "%FILTER_STATE(wasm.kuadrant.auth.identity.organizationId:PLAIN)%"
                # ── Tokens (json_to_metadata → dynamic metadata) ──
                - key: tokens_total
                  value:
                    string_value: "%DYNAMIC_METADATA(envoy.filters.http.json_to_metadata:tokens_total)%"
                - key: tokens_prompt
                  value:
                    string_value: "%DYNAMIC_METADATA(envoy.filters.http.json_to_metadata:tokens_prompt)%"
                - key: tokens_completion
                  value:
                    string_value: "%DYNAMIC_METADATA(envoy.filters.http.json_to_metadata:tokens_completion)%"
                # ── Model (json_to_metadata → dynamic metadata) ──
                - key: model
                  value:
                    string_value: "%DYNAMIC_METADATA(envoy.filters.http.json_to_metadata:model)%"
              resource_attributes:
                values:
                - key: service.name
                  value:
                    string_value: maas-gateway
                - key: service.namespace
                  value:
                    string_value: openshift-ingress
