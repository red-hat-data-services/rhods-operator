            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8082
              name: pprof
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
