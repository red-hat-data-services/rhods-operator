map:
  notebooks:
    git.url: https://github.com/red-hat-data-services/notebooks
    git.commit: github.ref_name
    src: manifests
    dest: workbenches/notebooks
    ref_type: branch
  odh-kserve-controller:
    src: config
    dest: kserve
  odh-kf-notebook-controller:
    src: components/notebook-controller/config
    dest: workbenches/kf-notebook-controller
  odh-notebook-controller:
    src: components/odh-notebook-controller/config
    dest: workbenches/odh-notebook-controller
  odh-data-science-pipelines-operator-controller:
    src: config
    dest: datasciencepipelines
  odh-kuberay-operator-controller:
    src: ray-operator/config
    dest: ray
  odh-trustyai-service-operator:
    src: config
    dest: trustyai
  odh-model-controller:
    src: config
    dest: modelcontroller
  odh-model-registry-operator:
    src: config
    dest: modelregistry
  odh-dashboard:
    src: manifests
    dest: dashboard
  odh-dashboard-operator:
    src: dashboard-operator/charts/dashboard
    dest: dashboardoperator
    type: chart
  odh-training-operator:
    src: manifests
    dest: trainingoperator
  odh-feast-operator:
    src: infra/feast-operator/config
    dest: feastoperator
  odh-trainer:
    src: manifests
    dest: trainer
  odh-mlflow-operator:
    src: config
    dest: mlflowoperator
  odh-maas-api:
    src: deployment
    dest: maas
  odh-spark-operator:
    src: config
    dest: sparkoperator
  odh-workload-variant-autoscaler-controller:
    src: config
    dest: wva
  odh-ogx-module-operator:
    src: config/
    dest: ogx
  odh-ai-gateway-operator:
    src: config
    dest: aigateway
  odh-mcp-lifecycle-module-operator:
    src: config
    dest: mcplifecycleoperator
