map:
  rhaii-helm-chart:
    git.url: https://github.com/red-hat-data-services/odh-gitops
    git.commit: b8c51650cbca746d5f00c36fecfaca660b4efb8f
    src: charts/dependencies
    # dest is relative to PREFETCHED_CHARTS_DIR_PATH (prefetched-charts/).
