# DSCInitialization configures the ODH operator's shared infrastructure
# (monitoring, trusted CA bundles, applications namespace).
# Must be created before the DataScienceCluster.
---
apiVersion: dscinitialization.opendatahub.io/v2
kind: DSCInitialization
metadata:
  labels:
    app.kubernetes.io/name: dscinitialization
  name: default-dsci
spec:
  monitoring:
    managementState: "Managed"
    namespace: 'redhat-ods-applications'
    metrics: {}
  applicationsNamespace: 'redhat-ods-applications'
  trustedCABundle:
    managementState: "Managed"
    customCABundle: ""
