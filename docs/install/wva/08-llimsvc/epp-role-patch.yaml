apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoscaling-example-llama-epp-role
  namespace: autoscaling-example
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - inference.networking.k8s.io
  - inference.networking.x-k8s.io
  resources:
  - inferencepools
  - inferenceobjectives
  - inferencemodels
  - inferencemodelrewrites
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
