apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: sim-llama
  namespace: autoscaling-example
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  router:
    scheduler: {}
    route: {}
    gateway:
      refs:
      - name: sim-gateway
        namespace: autoscaling-example
  model:
    name: "unsloth/Meta-Llama-3.1-8B"
    uri: "hf://unsloth/Meta-Llama-3.1-8B"
  storageInitializer:
    enabled: false
  labels:
    inference.optimization/acceleratorName: cpu
  scaling:
    minReplicas: 1
    maxReplicas: 5
    wva:
      variantCost: "10.0"
      keda:
        pollingInterval: 5
        cooldownPeriod: 30
  template:
    containers:
      - name: main
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.0
        command: ["/app/llm-d-inference-sim"]
        args:
          - "--port"
          - "8000"
          - "--model"
          - "unsloth/Meta-Llama-3.1-8B"
          - "--mode"
          - "random"
          - "--max-num-seqs"
          - "5"
          - "--time-to-first-token"
          - "100"
          - "--inter-token-latency"
          - "30"
          - "--ssl-certfile"
          - "/var/run/kserve/tls/tls.crt"
          - "--ssl-keyfile"
          - "/var/run/kserve/tls/tls.key"
        resources:
          requests:
            cpu: "200m"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          failureThreshold: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
